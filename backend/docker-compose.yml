services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: rydo-postgis
    environment:
      POSTGRES_DB: rydo
      POSTGRES_USER: rydo
      POSTGRES_PASSWORD: rydo_dev_password
    ports:
      - "5433:5432"
    volumes:
      - rydo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rydo -d rydo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rydo_postgres_data:
